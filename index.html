<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>樹心邊 - 樹木學習平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-[#F4F6F0] text-stone-800 font-sans min-h-screen flex flex-col">

  <header class="sticky top-0 z-40 bg-[#3E4A24] text-[#EBF0E3] shadow-md border-b border-[#2C3519]">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        
        <div class="flex items-center space-x-3 cursor-pointer" onclick="switchTab('catalog')">
          <div class="bg-[#EBF0E3] p-2 rounded-lg text-[#3E4A24]">
            <i class="fa-solid fa-tree text-xl"></i>
          </div>
          <div>
            <h1 class="text-xl font-bold tracking-wide">樹心邊</h1>
            <p class="text-[10px] text-[#8F9E75] font-bold">樹木學習平台</p>
          </div>
        </div>

        <nav class="hidden md:flex space-x-1">
          <button onclick="switchTab('catalog')" id="nav-catalog" class="nav-btn flex items-center space-x-1.5 px-3 py-2 rounded-md text-sm font-semibold transition-all bg-[#556B2F] text-white">
            <i class="fa-solid fa-book-open"></i><span>樹木圖鑑</span>
          </button>
          <button onclick="switchTab('knowledge')" id="nav-knowledge" class="nav-btn flex items-center space-x-1.5 px-3 py-2 rounded-md text-sm font-semibold transition-all text-[#C5D0B3] hover:text-white hover:bg-[#4E5D2E]">
            <i class="fa-solid fa-graduation-cap"></i><span>知識筆記</span>
          </button>
          <button onclick="switchTab('compare')" id="nav-compare" class="nav-btn flex items-center space-x-1.5 px-3 py-2 rounded-md text-sm font-semibold transition-all text-[#C5D0B3] hover:text-white hover:bg-[#4E5D2E] relative">
            <i class="fa-solid fa-layer-group"></i><span>特徵對比</span>
            <span id="compare-badge-desktop" class="hidden bg-[#D4AF37] text-stone-900 text-xs px-1.5 py-0.2 rounded-full font-bold ml-1">0</span>
          </button>
          <button onclick="switchTab('quiz')" id="nav-quiz" class="nav-btn flex items-center space-x-1.5 px-3 py-2 rounded-md text-sm font-semibold transition-all text-[#C5D0B3] hover:text-white hover:bg-[#4E5D2E]">
            <i class="fa-solid fa-award"></i><span>辨識挑戰</span>
          </button>
          <button onclick="switchTab('notes')" id="nav-notes" class="nav-btn flex items-center space-x-1.5 px-3 py-2 rounded-md text-sm font-semibold transition-all text-[#C5D0B3] hover:text-white hover:bg-[#4E5D2E]">
            <i class="fa-solid fa-location-dot"></i><span>觀測手記</span>
          </button>
        </nav>

        <div class="flex items-center space-x-1.5">
          <label class="flex items-center space-x-1 px-2.5 py-1.5 rounded-lg bg-[#4E5D2E] hover:bg-[#556B2F] text-white text-xs font-bold border border-[#556B2F] cursor-pointer">
            <i class="fa-solid fa-upload text-amber-300"></i>
            <span class="hidden sm:inline">匯入 JSON</span>
            <input type="file" id="json-file-input" accept=".json" class="hidden" onchange="importJson(event)">
          </label>
          <button onclick="exportJson()" class="flex items-center space-x-1 px-2.5 py-1.5 rounded-lg bg-[#4E5D2E] hover:bg-[#556B2F] text-white text-xs font-bold border border-[#556B2F]">
            <i class="fa-solid fa-download text-emerald-300"></i>
            <span class="hidden sm:inline">匯出 JSON</span>
          </button>
        </div>

      </div>
    </div>

    <div class="md:hidden fixed bottom-0 left-0 right-0 bg-[#3E4A24] border-t border-[#2C3519] grid grid-cols-5 z-40 shadow-lg">
      <button onclick="switchTab('catalog')" id="mob-nav-catalog" class="mob-nav-btn flex flex-col items-center justify-center py-2 text-[#EBF0E3] bg-[#556B2F]">
        <i class="fa-solid fa-book-open text-lg mb-0.5"></i><span class="text-[10px]">圖鑑</span>
      </button>
      <button onclick="switchTab('knowledge')" id="mob-nav-knowledge" class="mob-nav-btn flex flex-col items-center justify-center py-2 text-[#8F9E75]">
        <i class="fa-solid fa-graduation-cap text-lg mb-0.5"></i><span class="text-[10px]">知識</span>
      </button>
      <button onclick="switchTab('compare')" id="mob-nav-compare" class="mob-nav-btn flex flex-col items-center justify-center py-2 text-[#8F9E75] relative">
        <i class="fa-solid fa-layer-group text-lg mb-0.5"></i><span class="text-[10px]">對比</span>
        <span id="compare-badge-mobile" class="hidden absolute top-1 right-2 bg-[#D4AF37] text-stone-900 text-[9px] px-1.5 py-0.2 rounded-full font-black shadow">0</span>
      </button>
      <button onclick="switchTab('quiz')" id="mob-nav-quiz" class="mob-nav-btn flex flex-col items-center justify-center py-2 text-[#8F9E75]">
        <i class="fa-solid fa-award text-lg mb-0.5"></i><span class="text-[10px]">挑戰</span>
      </button>
      <button onclick="switchTab('notes')" id="mob-nav-notes" class="mob-nav-btn flex flex-col items-center justify-center py-2 text-[#8F9E75]">
        <i class="fa-solid fa-location-dot text-lg mb-0.5"></i><span class="text-[10px]">手記</span>
      </button>
    </div>
  </header>

  <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6 mb-16 md:mb-6">
    
    <section id="tab-catalog" class="tab-content space-y-6">
      <div class="bg-white p-4 rounded-xl shadow-sm border border-stone-200/80 flex flex-col md:flex-row gap-4 items-center justify-between">
        <div class="relative w-full md:w-96">
          <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-stone-400 text-xs"></i>
          <input type="text" id="search-input" oninput="renderCatalog()" placeholder="搜尋樹木名稱、科別..." class="w-full pl-9 pr-4 py-2 rounded-lg border border-stone-300 focus:outline-none focus:ring-2 focus:ring-[#556B2F] text-xs">
        </div>
        <div class="w-full md:w-auto flex items-center space-x-2 overflow-x-auto py-1">
          <i class="fa-solid fa-filter text-stone-400 text-xs shrink-0"></i>
          <span class="text-xs text-stone-500 font-bold shrink-0">科別過濾：</span>
          <div id="family-filters" class="flex space-x-1"></div>
        </div>
      </div>

      <div id="tree-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </section>

    <section id="tab-knowledge" class="tab-content hidden space-y-6 max-w-5xl mx-auto">
      <div class="bg-gradient-to-r from-[#3E4A24] to-[#556B2F] text-white p-6 sm:p-8 rounded-2xl shadow-lg space-y-2">
        <span class="bg-[#D4AF37] text-stone-950 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest inline-block">
          KNOWLEDGE BASE
        </span>
        <h2 class="text-2xl sm:text-3xl font-extrabold">樹木學與風險管理知識筆記</h2>
        <p class="text-stone-200 text-xs sm:text-sm leading-relaxed max-w-2xl">
          點選下方知識卡片，開啟專屬講堂與詳細文章內容。
        </p>
      </div>

      <div id="knowledge-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </section>

    <section id="tab-compare" class="tab-content hidden space-y-6">
      <div class="bg-white p-5 rounded-2xl border border-stone-200 shadow-sm flex justify-between items-center">
        <div>
          <h3 class="text-xl font-black text-[#3E4A24] flex items-center space-x-2">
            <i class="fa-solid fa-layer-group text-[#556B2F]"></i>
            <span>特寫相片與指標左右比對</span>
          </h3>
          <p class="text-stone-500 text-xs mt-1">選取最多 3 種樹木進行特寫相片與指標對照。</p>
        </div>
        <button onclick="clearCompare()" class="text-xs text-red-600 font-bold hover:underline">清空對比</button>
      </div>

      <div id="compare-table-container"></div>
    </section>

    <section id="tab-quiz" class="tab-content hidden max-w-2xl mx-auto space-y-6">
      <div class="bg-white p-6 rounded-2xl border border-stone-200 text-center">
        <span class="bg-[#D4AF37] text-stone-950 text-[10px] font-black px-3 py-1 rounded-full uppercase">
          微觀辨識挑戰賽
        </span>
        <h3 class="text-xl font-bold text-[#3E4A24] mt-2">學名與特徵挑戰題</h3>
        <div class="mt-3 inline-flex items-center space-x-1.5 bg-[#F4F6F0] px-4 py-1.5 rounded-full border border-stone-200 text-xs font-bold text-[#556B2F]">
          <span>得分：</span>
          <span id="quiz-score" class="text-sm font-black">0</span>
          <span class="text-stone-300">/</span>
          <span id="quiz-total">0 題</span>
        </div>
      </div>

      <div id="quiz-card" class="bg-white rounded-2xl border border-stone-200 p-6 space-y-5"></div>
    </section>

    <section id="tab-notes" class="tab-content hidden space-y-6 max-w-4xl mx-auto">
      <div class="bg-white p-4 rounded-2xl border border-stone-200 shadow-sm flex items-center justify-between">
        <div>
          <h3 class="text-lg font-bold text-[#3E4A24]">野外觀察手記</h3>
          <p class="text-xs text-stone-400">紀錄您在野外發現的樹木特寫照片與筆記（自動儲存於此裝置）</p>
        </div>
        <button onclick="toggleAddNoteForm()" class="w-10 h-10 bg-[#556B2F] hover:bg-[#3E4A24] text-white rounded-xl transition-all flex items-center justify-center shadow-md active:scale-95 shrink-0">
          <i id="add-note-icon" class="fa-solid fa-plus text-lg transition-transform duration-300"></i>
        </button>
      </div>

      <div id="add-note-form" class="hidden bg-white p-6 rounded-2xl border border-stone-200 shadow-md space-y-4">
        <h4 class="text-sm font-extrabold text-[#3E4A24] border-b border-stone-100 pb-2">寫入全新觀察記錄</h4>
        <form onsubmit="saveNote(event)" class="space-y-3.5 text-xs">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label class="block font-bold text-stone-700 mb-1">觀測樹木 *</label>
              <select id="note-tree-select" required class="w-full p-2.5 rounded-lg border border-stone-300 text-xs"></select>
            </div>
            <div class="grid grid-cols-2 gap-2">
              <div>
                <label class="block font-bold text-stone-700 mb-1">日期</label>
                <input type="date" id="note-date" class="w-full p-2 rounded-lg border border-stone-300">
              </div>
              <div>
                <label class="block font-bold text-stone-700 mb-1">氣候</label>
                <select id="note-weather" class="w-full p-2 rounded-lg border border-stone-300">
                  <option value="Sunny">晴朗 ☀️</option>
                  <option value="Cloudy">多雲 ☁️</option>
                  <option value="Rainy">微雨 🌧️</option>
                </select>
              </div>
            </div>
          </div>
          <div>
            <label class="block font-bold text-stone-700 mb-1">詳細觀測地點</label>
            <input type="text" id="note-location" placeholder="例：台大植物園、大安森林公園池畔" class="w-full p-2 rounded-lg border border-stone-300">
          </div>
          <div>
            <label class="block font-bold text-stone-700 mb-1">實地觀測相片 (選擇本機檔案)</label>
            <input type="file" id="note-image-input" accept="image/*" onchange="previewNoteImage(event)" class="w-full border border-stone-300 p-2 rounded-lg text-xs bg-stone-50">
            <div id="note-image-preview" class="hidden mt-2 h-32 w-full rounded-xl overflow-hidden border border-stone-300 relative">
              <img id="note-preview-img" src="" class="w-full h-full object-cover">
            </div>
          </div>
          <div>
            <label class="block font-bold text-stone-700 mb-1">野外特徵紀錄與心得 *</label>
            <textarea id="note-content" rows="3" required placeholder="描述當天拍攝特寫時發現的特徵..." class="w-full p-2.5 rounded-lg border border-stone-300 leading-relaxed"></textarea>
          </div>
          <div class="flex justify-end space-x-2 pt-1">
            <button type="button" onclick="toggleAddNoteForm()" class="px-4 py-2 rounded-lg bg-stone-200 text-stone-700 font-bold">取消</button>
            <button type="submit" class="px-5 py-2 rounded-lg bg-[#556B2F] hover:bg-[#3E4A24] text-white font-bold">儲存手記</button>
          </div>
        </form>
      </div>

      <div id="notes-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </section>

  </main>

  <div id="tree-modal" class="hidden fixed inset-0 z-50 bg-stone-900/70 backdrop-blur-sm flex items-center justify-center p-3">
    <div class="bg-white rounded-2xl max-w-5xl w-full max-h-[92vh] overflow-hidden shadow-2xl border border-stone-200 flex flex-col md:flex-row">
      <div class="md:w-3/5 bg-stone-900 relative flex items-center justify-center min-h-[280px] md:min-h-0">
        <img id="modal-main-img" src="" class="w-full h-full object-cover max-h-[45vh] md:max-h-full">
        <div class="absolute inset-0 bg-black/10"></div>
        <div class="absolute top-4 left-4 bg-stone-900/80 backdrop-blur-md px-3.5 py-1.5 rounded-xl text-white">
          <h4 id="modal-tree-name" class="text-base font-black flex items-center space-x-2"></h4>
          <p id="modal-tree-latin" class="text-[11px] text-emerald-200 italic font-serif"></p>
        </div>
        <div id="modal-hotspots-container"></div>
      </div>

      <div class="md:w-2/5 flex flex-col max-h-[50vh] md:max-h-full overflow-y-auto bg-white">
        <div class="p-4 border-b border-stone-100 flex justify-between items-center bg-stone-50 sticky top-0 z-10">
          <span class="text-xs font-black text-stone-500 tracking-wider uppercase">樹木考證詳細資訊</span>
          <button onclick="closeTreeModal()" class="p-1 rounded-full hover:bg-stone-200 text-stone-500">
            <i class="fa-solid fa-xmark text-lg"></i>
          </button>
        </div>
        <div class="p-5 flex-grow space-y-5">
          <div class="space-y-1 text-xs">
            <p id="modal-description" class="text-stone-600 leading-relaxed font-normal bg-stone-50 p-3 rounded-xl border border-stone-100 mt-1"></p>
          </div>

          <div class="grid grid-cols-3 gap-1.5 bg-[#F4F6F0] p-2.5 rounded-xl border border-stone-200/60 text-[11px]">
            <div class="flex flex-col items-center text-center p-1.5 bg-white rounded-lg shadow-sm">
              <i class="fa-solid fa-ruler-vertical text-[#556B2F] mb-0.5"></i>
              <span class="text-[9px] text-stone-400 font-bold">樹高</span>
              <span id="modal-height" class="font-extrabold text-[#3E4A24] text-[10px] mt-0.5"></span>
            </div>
            <div class="flex flex-col items-center text-center p-1.5 bg-white rounded-lg shadow-sm">
              <i class="fa-solid fa-disease text-rose-500 mb-0.5"></i>
              <span class="text-[9px] text-stone-400 font-bold">花期</span>
              <span id="modal-bloom" class="font-extrabold text-[#3E4A24] text-[10px] mt-0.5"></span>
            </div>
            <div class="flex flex-col items-center text-center p-1.5 bg-white rounded-lg shadow-sm">
              <i class="fa-solid fa-apple-whole text-amber-600 mb-0.5"></i>
              <span class="text-[9px] text-stone-400 font-bold">果期</span>
              <span id="modal-fruit" class="font-extrabold text-[#3E4A24] text-[10px] mt-0.5"></span>
            </div>
          </div>

          <div id="modal-hotspot-detail" class="bg-[#F4F6F0] p-4 rounded-xl border border-stone-200/60 space-y-3"></div>

          <div class="bg-amber-200 p-3 rounded-xl text-xs">
            <p id="modal-special" class="text-stone-800 font-bold leading-relaxed"></p>
          </div>

          <div class="pt-3 border-t border-stone-100 space-y-2 bg-stone-50 p-3 rounded-xl border border-stone-200">
            <div class="flex items-center justify-between">
              <span class="text-xs font-bold text-[#3E4A24] flex items-center space-x-1">
                <i class="fa-solid fa-tag text-[#556B2F]"></i>
                <span>個人自訂備註 (自動儲存於本機)</span>
              </span>
              <button onclick="toggleEditNote()" class="text-[10px] text-[#556B2F] font-bold hover:underline">編輯備註</button>
            </div>
            <div id="note-view-mode" class="text-xs text-stone-700 leading-relaxed font-medium italic"></div>
            <div id="note-edit-mode" class="hidden space-y-2">
              <textarea id="note-textarea" rows="3" class="w-full p-2 text-xs rounded border border-stone-300 focus:outline-none focus:ring-2 focus:ring-[#556B2F] bg-white leading-relaxed" placeholder="在此寫下您的個人觀察備註..."></textarea>
              <div class="flex justify-end space-x-2">
                <button onclick="toggleEditNote()" class="px-2.5 py-1 text-[10px] font-bold text-stone-500 bg-stone-200 rounded">取消</button>
                <button onclick="saveUserNote()" class="px-3 py-1 text-[10px] font-bold text-white bg-[#556B2F] rounded">儲存備註</button>
              </div>
            </div>
          </div>
        </div>

        <div class="p-3 border-t border-stone-100 bg-stone-50 flex justify-end">
          <button onclick="closeTreeModal()" class="bg-stone-200 text-stone-700 px-4 py-1.5 rounded-lg text-xs font-bold">關閉視窗</button>
        </div>
      </div>
    </div>
  </div>

  <div id="article-modal" class="hidden fixed inset-0 z-50 bg-stone-900/70 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[88vh] overflow-y-auto shadow-2xl border border-stone-200 flex flex-col">
      <div class="p-5 border-b border-stone-100 flex justify-between items-center bg-[#3E4A24] text-white sticky top-0 z-10">
        <span id="article-modal-category" class="text-xs font-bold px-2.5 py-0.5 rounded-full"></span>
        <button onclick="closeArticleModal()" class="p-1 rounded-full hover:bg-white/20 text-white">
          <i class="fa-solid fa-xmark text-lg"></i>
        </button>
      </div>
      <div class="p-6 space-y-5">
        <h2 id="article-modal-title" class="text-xl sm:text-2xl font-extrabold text-[#3E4A24]"></h2>
        <div class="h-56 w-full bg-stone-100 rounded-xl overflow-hidden border border-stone-200">
          <img id="article-modal-img" src="" class="w-full h-full object-cover">
        </div>
        <div id="article-modal-content" class="text-xs sm:text-sm text-stone-700 leading-relaxed whitespace-pre-line space-y-3 font-normal bg-stone-50 p-4 rounded-xl border border-stone-100"></div>
      </div>
      <div class="p-4 border-t border-stone-100 bg-stone-50 flex justify-end">
        <button onclick="closeArticleModal()" class="bg-[#556B2F] hover:bg-[#3E4A24] text-white px-5 py-2 rounded-lg text-xs font-bold">關閉文章</button>
      </div>
    </div>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
